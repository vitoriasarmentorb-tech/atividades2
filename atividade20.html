<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Atividade 20</h1>

    <label>Digite seu nome:</label>
    <input type="text" id="nome"><br><br>

    <label>Digite o primeiro número:</label>
    <input type="number" id="n1"><br><br>

    <label>Digite o segundo número:</label>
    <input type="number" id="n2"><br><br>

    <label>Digite o terceiro número:</label>
    <input type="number" id="n3"><br><br>

    <button onclick="mostrar()">Mostrar Resultado</button>

    <div id="resultado"></div>

    <script>
        function mostrar() {
            const sistema = "Sistema de Cálculo";

            let nome = document.getElementById("nome").value;
            let n1 = Number(document.getElementById("n1").value);
            let n2 = Number(document.getElementById("n2").value);
            let n3 = Number(document.getElementById("n3").value);

            let soma = n1 + n2 + n3;

            document.getElementById("resultado").innerHTML =
                "<p>" + sistema + "</p>" +
                "<p>Nome: " + nome + "</p>" +
                "<p>Soma: " + soma + "</p>";
        }
    </script>
   
 

</body>

</html>
